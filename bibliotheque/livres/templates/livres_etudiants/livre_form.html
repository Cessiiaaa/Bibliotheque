{% extends 'base.html' %}

{% block title %}{{ livre.titre }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title">{{ livre.titre }}</h2>
                <div class="card-text">{{ livre.contenu|safe }}</div> <!-- Summernote rend du HTML -->
                <p class="card-text"><strong>Proprietaire :</strong> {{ livre.proprietaire.username }}</p>
                
                {% if user == livre.proprietaire %}
                    <a href="{% url 'livre_update' post.pk %}" class="btn btn-warning me-2">Modifier</a>
                    <a href="{% url 'livre_delete' post.pk %}" class="btn btn-danger">Supprimer</a>
                {% endif %}
                <a href="{% url 'liste_livres' %}" class="btn btn-outline-secondary mt-2">Retour à la liste</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
